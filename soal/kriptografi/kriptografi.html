<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuis Kriptografi Angka</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1e293b;
            --gray: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container { width: 100%; max-width: 500px; padding: 15px; }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 24px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Matriks Angka */
        .matrix-wrapper { display: flex; justify-content: center; align-items: center; margin: 25px 0; }
        .matrix {
            display: inline-grid; grid-template-columns: auto auto; gap: 15px 40px; 
            padding: 15px 25px; position: relative; 
            border-left: 2.5px solid #4c1d95; border-right: 2.5px solid #4c1d95;
        }
        .matrix::before, .matrix::after {
            content: ""; position: absolute; height: 12px; width: 12px; border-color: #4c1d95; border-style: solid;
        }
        .matrix::before { top: 0; left: 0; border-width: 2.5px 0 0 2.5px; }
        .matrix::after { bottom: 0; right: 0; border-width: 0 2.5px 2.5px 0; }
        .matrix div { font-size: 1.4rem; font-weight: 800; color: #6d28d9; min-width: 45px; }
        .label-small { font-size: 0.9rem; color: #4c1d95; font-weight: bold; margin-right: 15px; }

        /* Tombol Menu Utama */
        .btn-lvl {
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px;
            color: rgb(8, 1, 1); font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-easy { background: #2600ff; }
        .btn-medium { background: #2600ff; }
        .btn-hard { background: #2600ff; }
        .btn-lvl:hover { opacity: 0.9; transform: scale(1.02); }

        /* Pilihan Jawaban */
        .option {
            text-align: left; margin: 10px 0; padding: 14px;
            border-radius: 12px; background: #ffffff; border: 1.5px solid #e2e8f0;
            cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .correct { background: var(--success) !important; color: white; border-color: transparent; }
        .wrong { background: var(--danger) !important; color: white; border-color: transparent; }

        /* Navigasi Bawah */
        .nav-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-next { flex: 2; padding: 16px; background: #6d28d9; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-back { flex: 1; padding: 16px; background: #94a3b8; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .hidden { display: none; }
        .explanation {
            margin-top: 15px; text-align: left; font-size: 13px; padding: 12px;
            background: #f0fdf4; border-left: 4px solid #10b981; border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="startScreen" class="card">
        <h2 style="color: #4c1d95;">Kalkulasi Kripto</h2>
        <p style="font-size: 14px; color: #64748b; margin-bottom: 20px;">Pilih tingkat kesulitan untuk memulai</p>
        <button class="btn-lvl btn-easy" onclick="startQuiz('easy')">EASY</button>
        <button class="btn-lvl btn-medium" onclick="startQuiz('medium')">MEDIUM</button>
        <button class="btn-lvl btn-hard" onclick="startQuiz('hard')">HARD</button>
    </div>

    <div id="quizScreen" class="card hidden">
        <div id="timer" style="font-weight:bold; margin-bottom:10px;">Waktu: 110:00</div>
        <h3 id="questionTitle" style="font-size: 16px; color: #1e293b; min-height: 50px;"></h3>
        
        <div class="matrix-wrapper">
            <div class="matrix" id="matrixContent"></div>
        </div>

        <div id="options"></div>
        <div id="explanation" class="explanation hidden"></div>

        <div class="nav-group">
            <button class="btn-back" onclick="resetToMenu()">Kembali</button>
            <button class="btn-next" onclick="nextQuestion()">Lanjut</button>
        </div>
    </div>

    <div id="resultScreen" class="card hidden">
        <h2>Hasil Akhir</h2>
        <div id="scoreDisplay" style="font-size: 64px; font-weight: 800; color: var(--primary);">0</div>
        <p id="levelResult" style="font-weight: bold;"></p>
        <button onclick="resetToMenu()" style="background:#4c1d95; color:white; border:none; padding:15px; border-radius:12px; width:100%; cursor:pointer;">Main Lagi</button>
    </div>
</div>

<script>
let current = 0, score = 0, questions = [], selected = null, timer, timeLeft = 6600, currentLvl = "";

function generateQuestions(lvl) {
    let qArr = [];
    for (let i = 0; i < 30; i++) {
        let r = Math.random();
        if (lvl === 'easy') {
            if (r < 0.5) {
                let a = Math.floor(Math.random() * 30) + 5, m = Math.floor(Math.random() * 5) + 2, ans = a % m;
                qArr.push({ t: "Berapa hasil Modulo?", v: ["A", a, "M", m], o: shuffle([ans, ans+1, ans+2, 0]), a: ans, e: `${a} mod ${m} = ${ans}` });
            } else {
                let x = Math.floor(Math.random() * 8), y = Math.floor(Math.random() * 8), ans = x ^ y;
                qArr.push({ t: "Berapa hasil XOR?", v: ["X", x, "Y", y], o: shuffle([ans, x+y, 1, 0]), a: ans, e: `${x} XOR ${y} = ${ans}` });
            }
        } else if (lvl === 'medium') {
            if (r < 0.5) {
                let a = Math.floor(Math.random() * 200) + 50, m = Math.floor(Math.random() * 15) + 5, ans = a % m;
                qArr.push({ t: "Modulo Menengah:", v: ["A", a, "M", m], o: shuffle([ans, ans+1, ans+2, 7]), a: ans, e: `${a} mod ${m} = ${ans}` });
            } else {
                let x = Math.floor(Math.random() * 100) + 20, y = Math.floor(Math.random() * 100) + 20, ans = x ^ y;
                qArr.push({ t: "Bitwise XOR (8-bit):", v: ["X", x, "Y", y], o: shuffle([ans, x+y, ans+5, 0]), a: ans, e: `${x} XOR ${y} = ${ans}` });
            }
        } else {
            if (r < 0.5) {
                let base = Math.floor(Math.random() * 5) + 2, exp = Math.floor(Math.random() * 3) + 2, m = Math.floor(Math.random() * 10) + 3;
                let ans = Math.pow(base, exp) % m;
                qArr.push({ t: "Eksponensial Modulo:", v: ["B^E", `${base}^${exp}`, "MOD", m], o: shuffle([ans, (ans+1)%m, (ans+2)%m, 1]), a: ans, e: `${base}^${exp} = ${Math.pow(base, exp)}, mod ${m} = ${ans}` });
            } else {
                let x = Math.floor(Math.random() * 500) + 100, y = Math.floor(Math.random() * 500) + 100, ans = x ^ y;
                qArr.push({ t: "XOR Lanjutan:", v: ["X", x, "Y", y], o: shuffle([ans, x+y, x-y, 255]), a: ans, e: `Hasil: ${ans}` });
            }
        }
    }
    return qArr;
}

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function startQuiz(lvl) {
    current = 0; score = 0; timeLeft = 6600;
    currentLvl = lvl.toUpperCase();
    questions = generateQuestions(lvl);
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("resultScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");
    showQuestion();
    if (timer) clearInterval(timer);
    startTimer();
}

function showQuestion() {
    let q = questions[current];
    document.getElementById("questionTitle").innerText = `Level: ${currentLvl} | Soal ${current + 1}/30\n${q.t}`;
    document.getElementById("matrixContent").innerHTML = `
        <div class="label-small">${q.v[0]}</div><div>${q.v[1]}</div>
        <div class="label-small">${q.v[2]}</div><div>${q.v[3]}</div>`;
    let optHTML = "";
    q.o.forEach(opt => { optHTML += `<div class="option" onclick="check(${opt}, this)">${opt}</div>`; });
    document.getElementById("options").innerHTML = optHTML;
    document.getElementById("explanation").classList.add("hidden");
    selected = null;
}

function check(val, el) {
    if (selected !== null) return;
    selected = val;
    let q = questions[current];
    if (val === q.a) { score++; el.classList.add('correct'); }
    else { el.classList.add('wrong'); Array.from(document.querySelectorAll('.option')).forEach(o => { if(parseInt(o.innerText)===q.a) o.classList.add('correct'); }); }
    document.getElementById("explanation").innerText = "💡 " + q.e;
    document.getElementById("explanation").classList.remove("hidden");
}

function nextQuestion() {
    if (selected === null) return alert("Pilih jawaban!");
    current++;
    if (current < 30) showQuestion();
    else {
        document.getElementById("quizScreen").classList.add("hidden");
        document.getElementById("resultScreen").classList.remove("hidden");
        document.getElementById("scoreDisplay").innerText = score;
        document.getElementById("levelResult").innerText = "Selesai di Level: " + currentLvl;
        clearInterval(timer);
    }
}

function resetToMenu() {
    if (current > 0 && current < 30) {
        if (!confirm("Ingin membatalkan kuis dan kembali ke menu?")) return;
    }
    clearInterval(timer);
    document.getElementById("quizScreen").classList.add("hidden");
    document.getElementById("resultScreen").classList.add("hidden");
    document.getElementById("startScreen").classList.remove("hidden");
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft % 60;
        document.getElementById('timer').innerText = `Waktu: ${m}:${s < 10 ? '0'+s : s}`;
        if (timeLeft <= 0) nextQuestion();
    }, 1000);
}
</script>
</body>
</html>
