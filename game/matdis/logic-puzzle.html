<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benar atau Salah?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            color: #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            display: inline-block;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(51, 65, 85, 0.8);
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, #eab308, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .description {
            color: #94a3b8;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #10b981;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .statement {
            font-size: 1.25rem;
            font-weight: 500;
            line-height: 1.8;
            padding: 2rem;
            background: rgba(100, 116, 139, 0.2);
            border-radius: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-true {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
        }

        .btn-true:hover:not(.hidden) {
            background: linear-gradient(135deg, #059669, #0d9488);
        }

        .btn-false {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-false:hover:not(.hidden) {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .explanation {
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid;
        }

        .explanation.correct {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .explanation.wrong {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .explanation-header {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .explanation-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .explanation-title {
            font-weight: bold;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .explanation-answer {
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .explanation-text {
            font-size: 0.875rem;
            line-height: 1.6;
            padding-left: 2.25rem;
        }

        .tip-card {
            background: rgba(100, 116, 139, 0.2);
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            background: #10b981;
            color: white;
        }

        .toast.error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
<script>
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = '../../index.html?page=game';
  }
}
</script>
</head>
<body>
    <div class="container">
        <a href="#" onclick="goBack();return false;" class="back-btn">← Kembali</a>

        <div class="card">
            <h1 class="title">Benar atau Salah?</h1>
            <p class="description">Evaluasi pernyataan logika berikut - apakah benar atau salah?</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Benar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Akurasi</div>
            </div>
        </div>

        <div class="card">
            <div class="statement" id="statement"></div>

            <div id="buttonsContainer">
                <div class="buttons">
                    <button class="btn btn-true" onclick="handleAnswer(true)">
                        ✓ BENAR
                    </button>
                    <button class="btn btn-false" onclick="handleAnswer(false)">
                        ✗ SALAH
                    </button>
                </div>
            </div>

            <div id="explanationContainer" class="hidden"></div>
        </div>

        <div class="card tip-card">
            💡 <strong>Tip:</strong> Perhatikan struktur argumen dan aturan inferensi logika
        </div>
    </div>

    <script>
        const statements = [
            {
                text: "Jika A → B benar dan A benar, maka B pasti benar",
                isTrue: true,
                explanation: "Ini adalah Modus Ponens, aturan dasar dalam logika proposisional",
            },
            {
                text: "Jika A → B benar dan B salah, maka A pasti salah",
                isTrue: true,
                explanation: "Ini adalah Modus Tollens, aturan valid dalam logika",
            },
            {
                text: "Jika A → B benar dan B benar, maka A pasti benar",
                isTrue: false,
                explanation: "Ini adalah Affirming the Consequent fallacy. B bisa benar tanpa A benar",
            },
            {
                text: "A ∧ (B ∨ C) sama dengan (A ∧ B) ∨ (A ∧ C)",
                isTrue: true,
                explanation: "Ini adalah Distributive Law dalam logika Boolean",
            },
            {
                text: "¬(A ∨ B) sama dengan ¬A ∧ ¬B",
                isTrue: true,
                explanation: "Ini adalah De Morgan's Law",
            },
            {
                text: "A → B sama dengan ¬A ∨ B",
                isTrue: true,
                explanation: "Implikasi dapat dinyatakan menggunakan disjungsi dan negasi",
            },
            {
                text: "Jika semua A adalah B, dan semua B adalah C, maka semua A adalah C",
                isTrue: true,
                explanation: "Ini adalah transitivity, prinsip dasar dalam logika",
            },
            {
                text: "Jika A ∨ B benar dan A salah, maka B pasti benar",
                isTrue: true,
                explanation: "Disjunctive Syllogism - jika salah satu dari disjungsi salah, yang lain harus benar",
            },
            {
                text: "A ∧ ¬A bisa benar dalam beberapa kasus",
                isTrue: false,
                explanation: "Ini adalah kontradiksi dan selalu salah (Law of Non-Contradiction)",
            },
            {
                text: "Jika A → B dan B → C, maka A → C",
                isTrue: true,
                explanation: "Hypothetical Syllogism - transitivity untuk implikasi",
            },
        ];

        let score = 0;
        let total = 0;
        let currentStatement = null;
        let showingExplanation = false;

        function getRandomStatement() {
            return statements[Math.floor(Math.random() * statements.length)];
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        function updateUI() {
            document.getElementById('statement').textContent = currentStatement.text;
            document.getElementById('score').textContent = score;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((score / total) * 100) + '%' : '0%';
        }

        function handleAnswer(answer) {
            if (showingExplanation) return;

            total++;
            const isCorrect = answer === currentStatement.isTrue;

            if (isCorrect) {
                score++;
                showToast('Benar! 🎉', 'success');
            } else {
                showToast('Salah!', 'error');
            }

            showingExplanation = true;
            document.getElementById('buttonsContainer').classList.add('hidden');
            
            const explanationDiv = document.getElementById('explanationContainer');
            explanationDiv.className = `explanation ${isCorrect ? 'correct' : 'wrong'}`;
            explanationDiv.innerHTML = `
                <div class="explanation-header">
                    <div class="explanation-icon">${isCorrect ? '✓' : '✗'}</div>
                    <div>
                        <div class="explanation-title">
                            ${isCorrect ? 'Jawaban Benar!' : 'Jawaban Salah!'}
                        </div>
                        <div class="explanation-answer">
                            Pernyataan ini <strong>${currentStatement.isTrue ? 'BENAR' : 'SALAH'}</strong>
                        </div>
                    </div>
                </div>
                <div class="explanation-text">
                    <strong>Penjelasan:</strong> ${currentStatement.explanation}
                </div>
            `;

            setTimeout(() => {
                showingExplanation = false;
                explanationDiv.classList.add('hidden');
                document.getElementById('buttonsContainer').classList.remove('hidden');
                currentStatement = getRandomStatement();
                updateUI();
            }, 3000);

            updateUI();
        }

        // Initialize
        currentStatement = getRandomStatement();
        updateUI();
    </script>
</body>
</html>
