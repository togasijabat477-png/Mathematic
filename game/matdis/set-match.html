<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Match Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            color: #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            display: inline-block;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(51, 65, 85, 0.8);
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .description {
            color: #94a3b8;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            padding: 1.5rem;
            border-radius: 0.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .operation-name {
            text-align: center;
            color: #94a3b8;
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }

        .operation-symbol {
            text-align: center;
            font-size: 2rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .sets-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .set-box {
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid;
        }

        .set-box.set-a {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(168, 85, 247, 0.05));
            border-color: rgba(168, 85, 247, 0.3);
        }

        .set-box.set-b {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(236, 72, 153, 0.05));
            border-color: rgba(236, 72, 153, 0.3);
        }

        .set-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .set-a .set-title {
            color: #a855f7;
        }

        .set-b .set-title {
            color: #ec4899;
        }

        .set-value {
            font-family: 'Courier New', monospace;
            font-size: 1.25rem;
        }

        .options {
            display: grid;
            gap: 1rem;
        }

        .option-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(100, 116, 139, 0.3);
            color: #e2e8f0;
            padding: 1.5rem;
            font-size: 1.25rem;
            font-family: 'Courier New', monospace;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            transform: scale(1.02);
        }

        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            background: #10b981;
            color: white;
        }

        .toast.error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
<script>
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = '../../index.html?page=game';
  }
}
</script>
</head>
<body>
    <div class="container">
        <a href="#" onclick="goBack();return false;" class="back-btn">← Kembali</a>

        <div class="card">
            <h1 class="title">Set Match Game</h1>
            <p class="description">Pilih hasil operasi himpunan yang benar</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Skor</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Akurasi</div>
            </div>
        </div>

        <div class="card">
            <div class="operation-name" id="operationName"></div>
            <div class="operation-symbol" id="operationSymbol"></div>
            <div class="sets-container">
                <div class="set-box set-a">
                    <div class="set-title">Himpunan A</div>
                    <div class="set-value" id="setA"></div>
                </div>
                <div class="set-box set-b">
                    <div class="set-title">Himpunan B</div>
                    <div class="set-value" id="setB"></div>
                </div>
            </div>
        </div>

        <div class="options" id="options"></div>
    </div>

    <script>
        let score = 0;
        let total = 0;
        let currentQuestion = null;

        function generateSet() {
            const size = Math.floor(Math.random() * 4) + 3;
            const set = new Set();
            while (set.size < size) {
                set.add(Math.floor(Math.random() * 10) + 1);
            }
            return Array.from(set).sort((a, b) => a - b);
        }

        function generateQuestion() {
            const setA = generateSet();
            const setB = generateSet();
            const operations = ['union', 'intersection', 'difference'];
            const operation = operations[Math.floor(Math.random() * operations.length)];

            let answer = [];
            switch (operation) {
                case 'union':
                    answer = Array.from(new Set([...setA, ...setB])).sort((a, b) => a - b);
                    break;
                case 'intersection':
                    answer = setA.filter(x => setB.includes(x)).sort((a, b) => a - b);
                    break;
                case 'difference':
                    answer = setA.filter(x => !setB.includes(x)).sort((a, b) => a - b);
                    break;
            }

            // Generate wrong answers
            const allNumbers = Array.from(new Set([...setA, ...setB]));
            const wrong1 = allNumbers.filter(x => !answer.includes(x)).slice(0, Math.max(1, answer.length));
            const wrong2 = [...answer].sort(() => Math.random() - 0.5).slice(0, Math.max(1, answer.length - 1));
            
            const options = [answer, wrong1, wrong2].sort(() => Math.random() - 0.5);

            return { setA, setB, operation, answer, options };
        }

        function getOperationSymbol(op) {
            switch (op) {
                case 'union': return '∪';
                case 'intersection': return '∩';
                case 'difference': return '−';
            }
        }

        function getOperationName(op) {
            switch (op) {
                case 'union': return 'Gabungan (Union)';
                case 'intersection': return 'Irisan (Intersection)';
                case 'difference': return 'Selisih (Difference)';
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        function updateUI() {
            document.getElementById('operationName').textContent = getOperationName(currentQuestion.operation);
            document.getElementById('operationSymbol').textContent = `A ${getOperationSymbol(currentQuestion.operation)} B`;
            document.getElementById('setA').textContent = `{${currentQuestion.setA.join(', ')}}`;
            document.getElementById('setB').textContent = `{${currentQuestion.setB.join(', ')}}`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            currentQuestion.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `{${option.join(', ')}}`;
                btn.onclick = () => handleAnswer(option);
                optionsDiv.appendChild(btn);
            });

            document.getElementById('score').textContent = score;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((score / total) * 100) + '%' : '0%';
        }

        function handleAnswer(selected) {
            total++;
            const isCorrect = JSON.stringify(selected.sort()) === JSON.stringify(currentQuestion.answer.sort());

            if (isCorrect) {
                score++;
                showToast('Benar! 🎉', 'success');
            } else {
                showToast(`Salah! Jawaban: {${currentQuestion.answer.join(', ')}}`, 'error');
            }

            setTimeout(() => {
                currentQuestion = generateQuestion();
                updateUI();
            }, 1500);

            updateUI();
        }

        // Initialize
        currentQuestion = generateQuestion();
        updateUI();
    </script>
</body>
</html>
