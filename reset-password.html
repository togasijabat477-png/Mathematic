<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Math Unity</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f8f9ff;
      --border: #e4e8f5;
      --text: #0f1526;
      --text2: #4a5280;
      --text3: #9aa0c0;
      --accent: #5c41f5;
      --accent-light: #ede9ff;
      --green: #059669;
      --green-light: #d1fae5;
      --red: #dc2626;
      --red-light: #fee2e2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }
    .wrap { width: 100%; max-width: 420px; position: relative; z-index: 1; }
    .logo {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 28px;
      text-decoration: none;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #5c41f5, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #fff;
    }
    .logo-name { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px;
      box-shadow: 0 4px 24px rgba(92,65,245,.08);
      animation: slideUp .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-icon { font-size: 2.5rem; text-align: center; margin-bottom: 16px; }
    .card h2 { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .card p { font-size: .875rem; color: var(--text3); text-align: center; margin-bottom: 28px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: .78rem; font-weight: 700;
      color: var(--text2); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); opacity: .6;
    }
    .form-group input {
      width: 100%; padding: 12px 14px 12px 42px;
      border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9rem; outline: none; transition: all .2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(92,65,245,.1);
    }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: .85rem; padding: 4px;
      border-radius: 6px; transition: all .2s;
    }
    .toggle-pw:hover { color: var(--accent); background: var(--accent-light); }
    .btn-submit {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #5c41f5, #7c5cfc);
      color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: all .25s; margin-top: 8px;
      box-shadow: 0 4px 12px rgba(92,65,245,.3);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(92,65,245,.4); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .msg {
      margin-top: 14px; padding: 11px 14px; border-radius: 10px;
      font-size: .85rem; text-align: center; display: none; font-weight: 500;
    }
    .msg.error { display: block; background: var(--red-light); color: var(--red); border: 1px solid #fca5a5; }
    .msg.success { display: block; background: var(--green-light); color: var(--green); border: 1px solid #6ee7b7; }
    .back-link {
      text-align: center; margin-top: 20px;
    }
    .back-link a {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text3); text-decoration: none; font-size: .85rem;
      font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all .2s;
    }
    .back-link a:hover { color: var(--accent); background: var(--accent-light); }
  </style>
</head>
<body>

<div class="wrap">

  <a href="auth.html" class="logo">
    <div class="logo-icon">∑</div>
    <span class="logo-name">Math Unity</span>
  </a>

  <!-- STEP 1: Kirim email reset -->
  <div class="card" id="stepKirim">
    <div class="card-icon">🔑</div>
    <h2>Lupa Password?</h2>
    <p>Masukkan email kamu dan kami akan kirim link untuk reset password.</p>

    <div class="form-group">
      <label>📧 Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="resetEmail" placeholder="email@example.com" />
      </div>
    </div>

    <button class="btn-submit" id="btnKirim">📨 Kirim Link Reset</button>
    <div class="msg" id="kirimMsg"></div>
  </div>

  <!-- STEP 2: Isi password baru -->
  <div class="card" id="stepReset" style="display:none">
    <div class="card-icon">🔒</div>
    <h2>Buat Password Baru</h2>
    <p>Masukkan password baru untuk akun kamu.</p>

    <div class="form-group">
      <label>🔒 Password Baru</label>
      <div class="input-wrap">
