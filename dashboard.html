<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Math Unity</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    .topbar {
      background: #1a1d27; border-bottom: 1px solid #2d3148;
      padding: 16px 32px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 1.25rem; font-weight: 700; color: #a78bfa; }
    .btn-back {
      background: transparent; border: 1px solid #2d3148;
      color: #94a3b8; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-size: .875rem; transition: all .2s;
      text-decoration: none;
    }
    .btn-back:hover { background: #2d3148; color: #fff; }
    .btn-logout {
      background: transparent; border: 1px solid #ef4444;
      color: #ef4444; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-size: .875rem; transition: all .2s;
    }
    .btn-logout:hover { background: #ef4444; color: #fff; }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

    /* PROFILE */
    .profile-card {
      background: linear-gradient(135deg, #1a1d27, #2d1b69);
      border: 1px solid #4c1d95; border-radius: 20px;
      padding: 32px; margin-bottom: 32px;
      display: flex; align-items: center; gap: 24px;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .profile-info h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .profile-info p { color: #94a3b8; font-size: .875rem; }
    .profile-badge {
      margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,58,237,.2); color: #a78bfa;
      padding: 4px 12px; border-radius: 99px; font-size: .8rem;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: #1a1d27; border: 1px solid #2d3148;
      border-radius: 16px; padding: 24px; text-align: center;
    }
    .stat-card .icon { font-size: 2rem; margin-bottom: 12px; }
    .stat-card .num {
      font-size: 2rem; font-weight: 800; margin-bottom: 4px;
    }
    .stat-card .label { font-size: .8rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }

    /* MODUL PROGRESS */
    .card {
      background: #1a1d27; border: 1px solid #2d3148;
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 20px;
      padding-bottom: 12px; border-bottom: 1px solid #2d3148; color: #a78bfa;
    }

    .modul-item { margin-bottom: 20px; }
    .modul-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .modul-name { font-weight: 600; font-size: .95rem; }
    .modul-score { font-size: .875rem; color: #94a3b8; }
    .progress-track {
      background: #2d3148; border-radius: 99px; height: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px; transition: width 1s ease;
    }
    .fill-diskrit { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
    .fill-aljabar { background: linear-gradient(90deg, #0891b2, #22d3ee); }
    .fill-kripto { background: linear-gradient(90deg, #d97706, #fbbf24); }

    .empty-state { text-align: center; padding: 40px; color: #64748b; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }

    /* LEADERBOARD */
    .lb-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 16px; border-radius: 10px;
      background: #0f1117; margin-bottom: 8px;
      border: 1px solid #2d3148;
    }
    .lb-rank {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .875rem; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #000; }
    .rank-2 { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: #000; }
    .rank-3 { background: linear-gradient(135deg, #d97706, #f59e0b); color: #000; }
    .rank-other { background: #2d3148; color: #94a3b8; }
    .lb-email { flex: 1; font-size: .9rem; }
    .lb-skor { font-weight: 700; color: #a78bfa; }

    @media (max-width: 600px) {
      .profile-card { flex-direction: column; text-align: center; }
      .topbar { padding: 12px 16px; }
      .topbar h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>📊 Dashboard</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <a href="index.html" class="btn-back">← Kembali</a>
    <button class="btn-logout" id="btnLogout">Logout</button>
  </div>
</div>

<div class="container">

  <!-- PROFILE -->
  <div class="profile-card" id="profileCard">
    <div class="loading">⏳ Memuat profil...</div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="loading">⏳</div></div>
  </div>

  <!-- PROGRESS MODUL -->
  <div class="card">
    <h2>📚 Progress per Modul</h2>
    <div id="modulProgress"><div class="loading">⏳ Memuat...</div></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h2>🏆 Leaderboard — Top 10</h2>
    <div id="leaderboard"><div class="loading">⏳ Memuat...</div></div>
  </div>

</div>

<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://ytwfwxjutdlukjvnlnzv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0d2Z3eGp1dGRsdWtqdm5sbnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDEyNTEsImV4cCI6MjA5NjU3NzI1MX0.elwvWee305pJaWxGCVuaHBtyegFsu7Gvhs5L4dYEZMY'
  );

  let currentUser = null;

  // ── CEK LOGIN ──
  db.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      window.location.href = 'auth.html';
      return;
    }
    currentUser = session.user;
    loadDashboard();
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.href = 'auth.html';
  });

  async function loadDashboard() {
    await Promise.all([
      loadProfile(),
      loadStats(),
      loadModulProgress(),
      loadLeaderboard()
    ]);
  }

  // ── PROFILE ──
  async function loadProfile() {
    const { data } = await db
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    const email = currentUser.email;
    const initial = email.charAt(0).toUpperCase();
    const role = data?.role || 'user';

    document.getElementById('profileCard').innerHTML = `
      <div class="avatar">${initial}</div>
      <div class="profile-info">
        <h2>${email}</h2>
        <p>Member sejak ${new Date(currentUser.created_at).toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric' })}</p>
        <span class="profile-badge">${role === 'admin' ? '⚡ Admin' : '👤 User'}</span>
      </div>
    `;
  }

  // ── STATS ──
  async function loadStats() {
    const { data } = await db
      .from('progres_kuis')
      .select('*')
      .eq('user_id', currentUser.id);

    const totalKuis = data?.length || 0;
    const totalBenar = data?.reduce((sum, d) => sum + (d.skor || 0), 0) || 0;
    const totalSoal = data?.reduce((sum, d) => sum + (d.total_soal || 0), 0) || 0;
    const rataRata = totalSoal > 0 ? Math.round((totalBenar / totalSoal) * 100) : 0;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="icon">📝</div>
        <div class="num" style="color:#a78bfa">${totalKuis}</div>
        <div class="label">Total Kuis</div>
      </div>
      <div class="stat-card">
        <div class="icon">✅</div>
        <div class="num" style="color:#4ade80">${totalBenar}</div>
        <div class="label">Total Benar</div>
      </div>
      <div class="stat-card">
        <div class="icon">🎯</div>
        <div class="num" style="color:#fbbf24">${rataRata}%</div>
        <div class="label">Rata-rata</div>
      </div>
      <div class="stat-card">
        <div class="icon">🔥</div>
        <div class="num" style="color:#f87171">${totalSoal}</div>
        <div class="label">Total Soal</div>
      </div>
    `;
  }

  // ── PROGRESS MODUL ──
  async function loadModulProgress() {
    const { data } = await db
      .from('progres_kuis')
      .select('*')
      .eq('user_id', currentUser.id);

    if (!data || data.length === 0) {
      document.getElementById('modulProgress').innerHTML =
        '<div class="empty-state">📭 Belum ada kuis yang diselesaikan</div>';
      return;
    }

    const moduls = [
      { key: 'Matematika Diskrit', label: '∑ Matematika Diskrit', fill: 'fill-diskrit' },
      { key: 'Aljabar Linear', label: 'λ Aljabar Linear', fill: 'fill-aljabar' },
      { key: 'Kriptografi', label: '🔐 Kriptografi', fill: 'fill-kripto' }
    ];

    let html = '';
    moduls.forEach(m => {
      const modulData = data.filter(d => d.modul === m.key);
      if (modulData.length === 0) return;

      const totalBenar = modulData.reduce((sum, d) => sum + (d.skor || 0), 0);
      const totalSoal = modulData.reduce((sum, d) => sum + (d.total_soal || 0), 0);
      const pct = totalSoal > 0 ? Math.round((totalBenar / totalSoal) * 100) : 0;

      html += `
        <div class="modul-item">
          <div class="modul-header">
            <span class="modul-name">${m.label}</span>
            <span class="modul-score">${totalBenar}/${totalSoal} benar (${pct}%)</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill ${m.fill}" style="width:${pct}%"></div>
          </div>
        </div>`;
    });

    document.getElementById('modulProgress').innerHTML = html ||
      '<div class="empty-state">📭 Belum ada data</div>';
  }

  // ── LEADERBOARD ──
  async function loadLeaderboard() {
    const { data } = await db
      .from('progres_kuis')
      .select('user_id, skor, total_soal');

    if (!data || data.length === 0) {
      document.getElementById('leaderboard').innerHTML =
        '<div class="empty-state">📭 Belum ada data leaderboard</div>';
      return;
    }

    // Hitung total skor per user
    const userMap = {};
    data.forEach(d => {
      if (!userMap[d.user_id]) userMap[d.user_id] = { benar: 0, soal: 0 };
      userMap[d.user_id].benar += d.skor || 0;
      userMap[d.user_id].soal += d.total_soal || 0;
    });

    // Ambil email dari profiles
    const userIds = Object.keys(userMap);
    const { data: profiles } = await db
      .from('profiles')
      .select('id, email')
      .in('id', userIds);

    // Gabungkan & sort
    const ranked = userIds.map(uid => {
      const profile = profiles?.find(p => p.id === uid);
      const pct = userMap[uid].soal > 0
        ? Math.round((userMap[uid].benar / userMap[uid].soal) * 100) : 0;
      return {
        email: profile?.email || 'Unknown',
        benar: userMap[uid].benar,
        soal: userMap[uid].soal,
        pct,
        isMe: uid === currentUser.id
      };
    }).sort((a, b) => b.pct - a.pct).slice(0, 10);

    const rankClass = ['rank-1', 'rank-2', 'rank-3'];
    let html = '';
    ranked.forEach((u, i) => {
      html += `
        <div class="lb-item" style="${u.isMe ? 'border-color:#7c3aed;background:rgba(124,58,237,.1)' : ''}">
          <div class="lb-rank ${rankClass[i] || 'rank-other'}">${i + 1}</div>
          <div class="lb-email">
            ${u.email}
            ${u.isMe ? '<span style="font-size:.75rem;color:#a78bfa;margin-left:6px">(Kamu)</span>' : ''}
          </div>
          <div class="lb-skor">${u.pct}% · ${u.benar}/${u.soal}</div>
        </div>`;
    });

    document.getElementById('leaderboard').innerHTML = html;
  }
</script>
</body>
</html>
