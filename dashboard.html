<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Math Unity</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f8f9ff;
      --border: #e4e8f5;
      --text: #0f1526;
      --text2: #4a5280;
      --text3: #9aa0c0;
      --accent: #5c41f5;
      --accent2: #7c5cfc;
      --accent-light: #ede9ff;
      --green: #059669;
      --green-light: #d1fae5;
      --red: #dc2626;
      --red-light: #fee2e2;
      --amber: #d97706;
      --amber-light: #fef3c7;
      --teal: #0891b2;
      --teal-light: #e0f2fe;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(92,65,245,.06), 0 4px 16px rgba(92,65,245,.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 0 var(--border);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #5c41f5, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: #fff; font-weight: 700;
    }
    .logo-name { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px; border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: all .2s; text-decoration: none;
    }
    .btn-outline {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .btn-danger { background: var(--red-light); color: var(--red); }
    .btn-danger:hover { background: #fecaca; }

    /* ── MAIN ── */
    .main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

    /* ── PROFILE HERO ── */
    .profile-hero {
      background: linear-gradient(135deg, #5c41f5 0%, #7c5cfc 60%, #a78bfa 100%);
      border-radius: var(--radius); padding: 28px 32px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.07);
    }
    .profile-hero::after {
      content: '';
      position: absolute; bottom: -50px; right: 100px;
      width: 140px; height: 140px; border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      border: 3px solid rgba(255,255,255,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: #fff;
      flex-shrink: 0; position: relative; z-index: 1;
    }
    .profile-info { position: relative; z-index: 1; }
    .profile-info h2 { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 3px; }
    .profile-info p { font-size: .875rem; color: rgba(255,255,255,.75); }
    .profile-badge {
      margin-top: 8px; display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      color: #fff; padding: 4px 12px; border-radius: 99px;
      font-size: .75rem; font-weight: 600;
    }
    .profile-stats {
      margin-left: auto; display: flex; gap: 24px;
      position: relative; z-index: 1;
    }
    .ps-item { text-align: center; }
    .ps-item .num { font-size: 1.5rem; font-weight: 800; color: #fff; line-height: 1; }
    .ps-item .lbl { font-size: .72rem; color: rgba(255,255,255,.65); margin-top: 3px; }

    /* ── TABS ── */
    .tab-nav {
      display: flex; gap: 4px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 4px; margin-bottom: 20px; width: fit-content;
    }
    .tab-btn {
      padding: 8px 18px; border-radius: 9px; border: none;
      background: transparent; color: var(--text3);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .tab-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(92,65,245,.3);
    }
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .card-title {
      font-size: .95rem; font-weight: 700; color: var(--text);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-title span { font-size: 1.1rem; }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-card .s-icon { font-size: 1.4rem; margin-bottom: 8px; }
    .stat-card .s-num { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .stat-card .s-lbl { font-size: .75rem; color: var(--text3); margin-top: 3px; font-weight: 500; }

    /* ── PROGRESS BARS ── */
    .module-item { margin-bottom: 16px; }
    .module-item:last-child { margin-bottom: 0; }
    .module-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .module-name { font-size: .875rem; font-weight: 600; color: var(--text); }
    .module-pct { font-size: .8rem; font-weight: 700; }
    .progress-track {
      background: var(--surface2); border-radius: 99px;
      height: 8px; overflow: hidden; border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      transition: width 1s cubic-bezier(.4,0,.2,1); width: 0%;
    }
    .fill-diskrit { background: linear-gradient(90deg, #5c41f5, #a78bfa); }
    .fill-aljabar { background: linear-gradient(90deg, #0891b2, #22d3ee); }
    .fill-kripto  { background: linear-gradient(90deg, #d97706, #fbbf24); }

    /* ── RIWAYAT KUIS ── */
    .riwayat-list { display: flex; flex-direction: column; gap: 8px; }
    .riwayat-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      transition: all .15s;
    }
    .riwayat-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(92,65,245,.08); }
    .riwayat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .icon-diskrit { background: var(--accent-light); }
    .icon-aljabar { background: var(--teal-light); }
    .icon-kripto  { background: var(--amber-light); }
    .riwayat-info { flex: 1; min-width: 0; }
    .riwayat-info .r-modul { font-size: .8rem; color: var(--text3); font-weight: 500; }
    .riwayat-info .r-title { font-size: .9rem; font-weight: 700; color: var(--text); }
    .riwayat-score {
      text-align: right; flex-shrink: 0;
    }
    .riwayat-score .r-skor { font-size: 1rem; font-weight: 800; color: var(--accent); }
    .riwayat-score .r-pct { font-size: .75rem; color: var(--text3); }
    .riwayat-score .r-date { font-size: .72rem; color: var(--text3); margin-top: 2px; }
    .level-badge {
      font-size: .7rem; font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px; border-radius: 6px; font-weight: 600;
    }
    .level-easy   { background: var(--green-light); color: var(--green); }
    .level-medium { background: var(--amber-light); color: var(--amber); }
    .level-hard   { background: var(--red-light); color: var(--red); }

    /* ── LEADERBOARD ── */
    .lb-list { display: flex; flex-direction: column; gap: 8px; }
    .lb-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      transition: all .15s;
    }
    .lb-item.me { border-color: var(--accent); background: var(--accent-light); }
    .lb-item:hover { box-shadow: var(--shadow); }
    .lb-rank {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .85rem; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; }
    .rank-2 { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: #fff; }
    .rank-3 { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
    .rank-n { background: var(--surface); border: 1px solid var(--border); color: var(--text3); }
    .lb-name { flex: 1; font-size: .875rem; font-weight: 600; }
    .lb-me-tag { font-size: .72rem; color: var(--accent); font-weight: 500; margin-left: 4px; }
    .lb-score { font-weight: 700; color: var(--accent); font-size: .875rem; }

    /* ── EMPTY / LOADING ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
    .empty .e-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty p { font-size: .875rem; }
    .loading-text { text-align: center; padding: 32px; color: var(--text3); font-size: .875rem; }

    /* ── TWO COL ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 640px) {
      .profile-stats { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .profile-hero { padding: 20px; }
      .topbar { padding: 12px 16px; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">∑</div>
    <span class="logo-name">Math Unity</span>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="btn btn-outline">← Beranda</a>
    <button class="btn btn-danger" id="btnLogout">Keluar</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PROFILE HERO -->
  <div class="profile-hero" id="profileHero">
    <div class="avatar" id="profileAvatar">?</div>
    <div class="profile-info">
      <h2 id="profileName">Memuat...</h2>
      <p id="profileEmail">-</p>
      <div class="profile-badge" id="profileRole">👤 User</div>
    </div>
    <div class="profile-stats" id="profileStats">
      <div class="ps-item"><div class="num" id="psKuis">-</div><div class="lbl">Kuis</div></div>
      <div class="ps-item"><div class="num" id="psBenar">-</div><div class="lbl">Benar</div></div>
      <div class="ps-item"><div class="num" id="psRata">-</div><div class="lbl">Rata-rata</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('overview', this)">📊 Overview</button>
    <button class="tab-btn" onclick="switchTab('riwayat', this)">📋 Riwayat Kuis</button>
    <button class="tab-btn" onclick="switchTab('leaderboard', this)">🏆 Leaderboard</button>
  </div>

  <!-- TAB: OVERVIEW -->
  <div class="tab-page active" id="tab-overview">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card"><div class="s-icon">📝</div><div class="s-num" id="statKuis">-</div><div class="s-lbl">Total Kuis</div></div>
      <div class="stat-card"><div class="s-icon">✅</div><div class="s-num" id="statBenar">-</div><div class="s-lbl">Total Benar</div></div>
      <div class="stat-card"><div class="s-icon">🎯</div><div class="s-num" id="statRata">-</div><div class="s-lbl">Rata-rata</div></div>
    </div>

    <div class="two-col">
      <!-- Progress Modul -->
      <div class="card">
        <div class="card-title"><span>📚</span> Progress per Modul</div>
        <div id="modulProgress"><div class="loading-text">⏳ Memuat...</div></div>
      </div>

      <!-- Kuis Terakhir -->
      <div class="card">
        <div class="card-title"><span>🕐</span> Kuis Terakhir</div>
        <div id="kuisTerakhir"><div class="loading-text">⏳ Memuat...</div></div>
      </div>
    </div>
  </div>

  <!-- TAB: RIWAYAT -->
  <div class="tab-page" id="tab-riwayat">
    <div class="card">
      <div class="card-title"><span>📋</span> Riwayat Semua Kuis</div>
      <div id="riwayatList"><div class="loading-text">⏳ Memuat...</div></div>
    </div>
  </div>

  <!-- TAB: LEADERBOARD -->
  <div class="tab-page" id="tab-leaderboard">
    <div class="card">
      <div class="card-title"><span>🏆</span> Top 10 — Leaderboard</div>
      <div id="leaderboardList"><div class="loading-text">⏳ Memuat...</div></div>
    </div>
  </div>

</div>

<script>
const { createClient } = supabase;
const db = createClient(
  'https://ytwfwxjutdlukjvnlnzv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0d2Z3eGp1dGRsdWtqdm5sbnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDEyNTEsImV4cCI6MjA5NjU3NzI1MX0.elwvWee305pJaWxGCVuaHBtyegFsu7Gvhs5L4dYEZMY'
);

let currentUser = null;
let allKuis = [];

// ── CEK LOGIN ──
db.auth.getSession().then(({ data: { session } }) => {
  if (!session) { window.location.href = 'auth.html'; return; }
  currentUser = session.user;
  loadAll();
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  await db.auth.signOut();
  window.location.href = 'auth.html';
});

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-page').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── LOAD ALL ──
async function loadAll() {
  await Promise.all([loadProfile(), loadKuis()]);
}

// ── PROFILE ──
async function loadProfile() {
  const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  const email = currentUser.email;
  const nama = profile?.nama || email.split('@')[0];
  const initial = nama.charAt(0).toUpperCase();
  const role = profile?.role || 'user';

  document.getElementById('profileAvatar').textContent = initial;
  document.getElementById('profileName').textContent = 'Halo, ' + nama + '! 👋';
  document.getElementById('profileEmail').textContent = email;
  document.getElementById('profileRole').textContent = role === 'admin' ? '⚡ Administrator' : '👤 Mahasiswa';
}

// ── KUIS DATA ──
async function loadKuis() {
  const { data, error } = await db
    .from('progres_kuis')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (error || !data) { allKuis = []; } else { allKuis = data; }

  updateStats();
  renderModulProgress();
  renderKuisTerakhir();
  renderRiwayat();
  renderLeaderboard();
}

// ── STATS ──
function updateStats() {
  const total = allKuis.length;
  const benar = allKuis.reduce((s, d) => s + (d.skor || 0), 0);
  const soal  = allKuis.reduce((s, d) => s + (d.total_soal || 0), 0);
  const rata  = soal > 0 ? Math.round(benar / soal * 100) : 0;

  document.getElementById('statKuis').textContent = total;
  document.getElementById('statBenar').textContent = benar;
  document.getElementById('statRata').textContent = rata + '%';
  document.getElementById('psKuis').textContent = total;
  document.getElementById('psBenar').textContent = benar;
  document.getElementById('psRata').textContent = rata + '%';
}

// ── PROGRESS MODUL ──
function renderModulProgress() {
  const moduls = [
    { key: 'Matematika Diskrit', label: '∑ Matematika Diskrit', fill: 'fill-diskrit' },
    { key: 'Aljabar Linear',     label: 'λ Aljabar Linear',     fill: 'fill-aljabar' },
    { key: 'Kriptografi',        label: '🔐 Kriptografi',       fill: 'fill-kripto'  }
  ];

  if (!allKuis.length) {
    document.getElementById('modulProgress').innerHTML = `
      <div class="empty"><div class="e-icon">📭</div><p>Belum ada kuis dikerjakan</p></div>`;
    return;
  }

  let html = '';
  moduls.forEach(m => {
    const data = allKuis.filter(d => d.modul === m.key);
    if (!data.length) return;
    const benar = data.reduce((s, d) => s + (d.skor || 0), 0);
    const soal  = data.reduce((s, d) => s + (d.total_soal || 0), 0);
    const pct   = soal > 0 ? Math.round(benar / soal * 100) : 0;
    const color = pct >= 70 ? '#059669' : pct >= 40 ? '#d97706' : '#dc2626';
    html += `
      <div class="module-item">
        <div class="module-header">
          <span class="module-name">${m.label}</span>
          <span class="module-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${m.fill}" id="pf-${m.key.replace(/ /g,'-')}" style="width:0%"></div>
        </div>
      </div>`;
    setTimeout(() => {
      const el = document.getElementById('pf-' + m.key.replace(/ /g,'-'));
      if (el) el.style.width = pct + '%';
    }, 300);
  });

  document.getElementById('modulProgress').innerHTML = html ||
    '<div class="empty"><div class="e-icon">📭</div><p>Belum ada data</p></div>';
}

// ── KUIS TERAKHIR (5 terbaru) ──
function renderKuisTerakhir() {
  const recent = allKuis.slice(0, 5);
  if (!recent.length) {
    document.getElementById('kuisTerakhir').innerHTML =
      '<div class="empty"><div class="e-icon">📭</div><p>Belum ada kuis</p></div>';
    return;
  }
  document.getElementById('kuisTerakhir').innerHTML =
    '<div class="riwayat-list">' + recent.map(k => riwayatItemHTML(k)).join('') + '</div>';
}

// ── RIWAYAT LENGKAP ──
function renderRiwayat() {
  if (!allKuis.length) {
    document.getElementById('riwayatList').innerHTML =
      '<div class="empty"><div class="e-icon">📭</div><p>Belum ada riwayat kuis.<br>Yuk mulai kerjakan kuis!</p></div>';
    return;
  }
  document.getElementById('riwayatList').innerHTML =
    '<div class="riwayat-list">' + allKuis.map(k => riwayatItemHTML(k)).join('') + '</div>';
}

function riwayatItemHTML(k) {
  const pct = k.total_soal > 0 ? Math.round(k.skor / k.total_soal * 100) : 0;
  const iconMap = { 'Matematika Diskrit': { cls: 'icon-diskrit', ico: '∑' }, 'Aljabar Linear': { cls: 'icon-aljabar', ico: 'λ' }, 'Kriptografi': { cls: 'icon-kripto', ico: '🔐' } };
  const ic = iconMap[k.modul] || { cls: 'icon-diskrit', ico: '📝' };
  const levelCls = k.level === 'easy' ? 'level-easy' : k.level === 'medium' ? 'level-medium' : k.level === 'hard' ? 'level-hard' : '';
  const levelLabel = k.level === 'easy' ? 'Easy' : k.level === 'medium' ? 'Medium' : k.level === 'hard' ? 'Hard' : '';
  const date = k.created_at ? new Date(k.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) : '-';
  const color = pct >= 70 ? '#059669' : pct >= 40 ? '#d97706' : '#dc2626';
  return `
    <div class="riwayat-item">
      <div class="riwayat-icon ${ic.cls}">${ic.ico}</div>
      <div class="riwayat-info">
        <div class="r-modul">${k.modul || '-'} ${levelLabel ? '<span class="level-badge ' + levelCls + '">' + levelLabel + '</span>' : ''}</div>
        <div class="r-title">${k.skor}/${k.total_soal} soal benar</div>
      </div>
      <div class="riwayat-score">
        <div class="r-skor" style="color:${color}">${pct}%</div>
        <div class="r-date">${date}</div>
      </div>
    </div>`;
}

// ── LEADERBOARD ──
async function renderLeaderboard() {
  const { data, error } = await db.from('progres_kuis').select('user_id, skor, total_soal');
  if (error || !data || !data.length) {
    document.getElementById('leaderboardList').innerHTML =
      '<div class="empty"><div class="e-icon">📭</div><p>Belum ada data leaderboard</p></div>';
    return;
  }

  // Hitung per user
  const map = {};
  data.forEach(d => {
    if (!map[d.user_id]) map[d.user_id] = { benar: 0, soal: 0 };
    map[d.user_id].benar += d.skor || 0;
    map[d.user_id].soal  += d.total_soal || 0;
  });

  // Ambil profiles
  const { data: profiles } = await db.from('profiles').select('id, email, nama').in('id', Object.keys(map));

  // Sort
  const ranked = Object.keys(map).map(uid => {
    const p = profiles?.find(x => x.id === uid);
    const pct = map[uid].soal > 0 ? Math.round(map[uid].benar / map[uid].soal * 100) : 0;
    const nama = p?.nama || (p?.email ? p.email.split('@')[0] : 'User');
    return { uid, nama, pct, benar: map[uid].benar, soal: map[uid].soal, isMe: uid === currentUser.id };
  }).sort((a, b) => b.pct - a.pct).slice(0, 10);

  const rankCls = ['rank-1','rank-2','rank-3'];
  document.getElementById('leaderboardList').innerHTML = '<div class="lb-list">' +
    ranked.map((u, i) => `
      <div class="lb-item ${u.isMe ? 'me' : ''}">
        <div class="lb-rank ${rankCls[i] || 'rank-n'}">${i + 1}</div>
        <div class="lb-name">
          ${u.nama}
          ${u.isMe ? '<span class="lb-me-tag">(Kamu)</span>' : ''}
        </div>
        <div class="lb-score">${u.pct}% · ${u.benar}/${u.soal}</div>
      </div>`).join('') + '</div>';
}
</script>
</body>
</html>
