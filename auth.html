<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Math Unity</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Background animated blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    .blob1 { width: 400px; height: 400px; background: rgba(124,58,237,.15); top: -100px; left: -100px; }
    .blob2 { width: 300px; height: 300px; background: rgba(20,184,166,.1); bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 200px; height: 200px; background: rgba(245,158,11,.08); top: 50%; left: 50%; animation-delay: 4s; }

    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .auth-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
    }

    /* Logo */
    .auth-logo {
      text-align: center; margin-bottom: 32px;
    }
    .auth-logo a {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 900;
      color: #e2e8f0;
    }

    /* Card */
    .auth-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,.4);
      animation: cardIn .5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Tabs */
    .auth-tabs {
      display: flex; background: #0f1117;
      border-radius: 12px; padding: 4px;
      margin-bottom: 32px; gap: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border-radius: 10px; border: none;
      background: transparent; color: #64748b;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .tab-btn.active {
      background: #7c3aed; color: #fff;
      box-shadow: 0 4px 12px rgba(124,58,237,.4);
    }

    /* Title */
    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900;
      margin-bottom: 6px; color: #f1f5f9;
    }
    .auth-subtitle {
      font-size: .875rem; color: #64748b;
      margin-bottom: 28px;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: .8rem; font-weight: 600;
      color: #94a3b8; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .06em;
      font-family: 'DM Mono', monospace;
    }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 1rem;
      pointer-events: none;
    }
    .form-group input {
      width: 100%; padding: 13px 14px 13px 42px;
      border-radius: 12px; border: 1.5px solid #2d3148;
      background: #0f1117; color: #e2e8f0;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; outline: none;
      transition: all .2s;
    }
    .form-group input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }
    .form-group input::placeholder { color: #475569; }

    /* Password toggle */
    .toggle-pw {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #64748b; cursor: pointer;
      font-size: .9rem; transition: color .2s;
    }
    .toggle-pw:hover { color: #a78bfa; }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 14px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all .25s;
      margin-top: 8px; position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(124,58,237,.4);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,.5);
    }
    .btn-submit:disabled {
      opacity: .6; cursor: not-allowed; transform: none;
    }
    .btn-submit::after {
      content: ''; position: absolute;
      top: -50%; left: -60%; width: 50%; height: 200%;
      background: rgba(255,255,255,.1);
      transform: skewX(-15deg);
      transition: left .4s ease;
    }
    .btn-submit:hover::after { left: 130%; }

    /* Message */
    .auth-msg {
      margin-top: 16px; padding: 12px 16px;
      border-radius: 10px; font-size: .875rem;
      text-align: center; display: none;
    }
    .auth-msg.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      color: #f87171;
    }
    .auth-msg.success {
      display: block;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.2);
      color: #4ade80;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: #334155; font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #2d3148;
    }

    /* Footer */
    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: .8rem; color: #475569;
    }
    .auth-footer a {
      color: #a78bfa; text-decoration: none; font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* Back to home */
    .back-home {
      text-align: center; margin-top: 24px;
    }
    .back-home a {
      display: inline-flex; align-items: center; gap: 6px;
      color: #475569; text-decoration: none; font-size: .875rem;
      transition: color .2s;
    }
    .back-home a:hover { color: #a78bfa; }
  </style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="auth-wrap">

  <!-- Logo -->
  <div class="auth-logo">
    <a href="index.html">
      <div class="logo-icon">∑</div>
      <span class="logo-text">Math Unity</span>
    </a>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Login Form -->
    <div id="formLogin">
      <h2 class="auth-title">Selamat Datang 👋</h2>
      <p class="auth-subtitle">Masuk untuk melanjutkan belajar matematika</p>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="loginEmail" placeholder="email@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPassword" placeholder="••••••••" />
          <button class="toggle-pw" onclick="togglePw('loginPassword', this)" type="button">👁</button>
        </div>
      </div>

      <button class="btn-submit" id="btnLogin">Masuk →</button>
      <div class="auth-msg" id="loginMsg"></div>
    </div>

    <!-- Register Form -->
    <div id="formRegister" style="display:none">
      <h2 class="auth-title">Buat Akun Baru ✨</h2>
      <p class="auth-subtitle">Daftar gratis dan mulai belajar sekarang</p>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="registerEmail" placeholder="email@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="registerPassword" placeholder="Min. 6 karakter" />
          <button class="toggle-pw" onclick="togglePw('registerPassword', this)" type="button">👁</button>
        </div>
      </div>

      <button class="btn-submit" id="btnRegister">Daftar Sekarang →</button>
      <div class="auth-msg" id="registerMsg"></div>
    </div>

  </div>

  <!-- Back to home -->
  <div class="back-home">
    <a href="index.html">← Kembali ke Beranda</a>
  </div>

</div>

<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://ytwfwxjutdlukjvnlnzv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0d2Z3eGp1dGRsdWtqdm5sbnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDEyNTEsImV4cCI6MjA5NjU3NzI1MX0.elwvWee305pJaWxGCVuaHBtyegFsu7Gvhs5L4dYEZMY'
  );

  // Cek jika sudah login
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  // ── SWITCH TAB ──
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
    document.getElementById('formRegister').style.display = isLogin ? 'none' : 'block';
  }

  // ── TOGGLE PASSWORD ──
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.textContent = isText ? '👁' : '🙈';
  }

  // ── LOGIN ──
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    const btn = document.getElementById('btnLogin');

    if (!email || !password) {
      showMsg(msg, '❌ Email dan password wajib diisi', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Masuk...';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg(msg, '❌ ' + error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Masuk →';
    } else {
      showMsg(msg, '✅ Berhasil! Mengalihkan...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    }
  });

  // ── REGISTER ──
  document.getElementById('btnRegister').addEventListener('click', async () => {
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const msg = document.getElementById('registerMsg');
    const btn = document.getElementById('btnRegister');

    if (!email || !password) {
      showMsg(msg, '❌ Email dan password wajib diisi', 'error'); return;
    }
    if (password.length < 6) {
      showMsg(msg, '❌ Password minimal 6 karakter', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Mendaftar...';

    const { error } = await db.auth.signUp({ email, password });

    if (error) {
      showMsg(msg, '❌ ' + error.message, 'error');
    } else {
      showMsg(msg, '✅ Akun berhasil dibuat! Silakan masuk.', 'success');
      setTimeout(() => switchTab('login'), 2000);
    }

    btn.disabled = false;
    btn.textContent = 'Daftar Sekarang →';
  });

  function showMsg(el, text, type) {
    el.className = 'auth-msg ' + type;
    el.textContent = text;
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('formLogin').style.display !== 'none';
    if (loginVisible) document.getElementById('btnLogin').click();
    else document.getElementById('btnRegister').click();
  });
</script>
</body>
</html>
