<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Math Unity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0e6ff 25%, #ffffff 50%, #e6f0ff 75%, #f5e6ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Math Symbols */
        .math-symbols {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .math-symbol {
            position: absolute;
            font-size: 2rem;
            color: rgba(99, 102, 241, 0.15);
            animation: float 6s ease-in-out infinite;
            font-weight: 300;
        }

        .math-symbol:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; font-size: 2.5rem; }
        .math-symbol:nth-child(2) { top: 25%; right: 15%; animation-delay: 1s; font-size: 1.8rem; }
        .math-symbol:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; font-size: 2.2rem; }
        .math-symbol:nth-child(4) { top: 60%; right: 10%; animation-delay: 0.5s; font-size: 3rem; }
        .math-symbol:nth-child(5) { bottom: 20%; right: 20%; animation-delay: 1.5s; font-size: 2rem; }
        .math-symbol:nth-child(6) { top: 40%; left: 5%; animation-delay: 3s; font-size: 1.5rem; }
        .math-symbol:nth-child(7) { bottom: 10%; left: 30%; animation-delay: 2.5s; font-size: 2.8rem; }
        .math-symbol:nth-child(8) { top: 10%; right: 30%; animation-delay: 4s; font-size: 1.6rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.25; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 8px 32px rgba(99, 102, 241, 0.1),
                0 2px 8px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            padding: 48px 40px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 40px rgba(99, 102, 241, 0.15),
                0 4px 12px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e1b4b, #4338ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Welcome Section */
        .welcome {
            text-align: center;
            margin-bottom: 36px;
        }

        .welcome h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.6;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 1.1rem;
            color: #9ca3af;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: #1f2937;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: #ffffff;
        }

        .form-group input:focus + .input-icon,
        .form-group input:focus ~ .input-icon {
            color: #6366f1;
        }

        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #9ca3af;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .input-wrapper .toggle-password:hover {
            color: #6366f1;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
        }

        .divider span {
            font-size: 0.85rem;
            color: #9ca3af;
            font-weight: 500;
        }

        /* Register Section */
        .register-section {
            text-align: center;
        }

        .register-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 6px;
        }

        .register-section p {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: rgba(99, 102, 241, 0.08);
            color: #6366f1;
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #6366f1;
            transform: translateX(-4px);
        }

        .text-center {
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .welcome h1 {
                font-size: 1.3rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .form-group:nth-child(1) { animation: fadeInUp 0.6s ease 0.1s forwards; opacity: 0; }
        .form-group:nth-child(2) { animation: fadeInUp 0.6s ease 0.2s forwards; opacity: 0; }
    </style>
</head>
<body>
    <!-- Floating Math Symbols -->
    <div class="math-symbols">
        <span class="math-symbol">∑</span>
        <span class="math-symbol">×</span>
        <span class="math-symbol">÷</span>
        <span class="math-symbol"></span>
        <span class="math-symbol">π</span>
        <span class="math-symbol">√</span>
        <span class="math-symbol">∫</span>
        <span class="math-symbol">±</span>
    </div>

    <div class="container">
        <div class="card">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">∑</div>
                <span class="logo-text">Math Unity</span>
            </div>

            <!-- Welcome -->
            <div class="welcome">
                <h1>Selamat Datang 👋</h1>
                <p>Masuk untuk melanjutkan belajar matematika</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" placeholder="Masukkan email Anda" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Masuk →</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>atau</span>
            </div>

            <!-- Register Section -->
            <div class="register-section">
                <h3>Buat Akun Baru </h3>
                <p>Daftar gratis dan mulai belajar sekarang</p>

                <form id="registerForm">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <span class="input-icon">️</span>
                            <input type="email" id="reg-email" placeholder="Email Anda" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="reg-password" placeholder="Password" required>
                            <button type="button" class="toggle-password" onclick="toggleRegPassword()">👁</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Daftar Sekarang →</button>
                </form>
            </div>

            <!-- Back Link -->
            <div class="text-center">
                <a href="index.html" class="back-link">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        function toggleRegPassword() {
            const passwordInput = document.getElementById('reg-password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        // Form submission handlers
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your login logic here
            alert('Login berhasil!');
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your register logic here
            alert('Pendaftaran berhasil!');
        });
    </script>
</body>
</html>
