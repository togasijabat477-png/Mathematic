<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelajaran Kriptografi | Matematika Diskrit</title>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://www.youtube-nocookie.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #10131f;
            color: white;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 34px;
            margin-bottom: 8px;
        }

        .header p {
            color: #cfd8dc;
            line-height: 1.5;
        }

        .main-player {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #currentVideoTitle {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            line-height: 1.35;
        }

        #currentVideoDescription {
            margin-top: 8px;
            text-align: center;
            color: #cfd8dc;
            line-height: 1.5;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-align: left;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .video-card:hover,
        .video-card:focus-visible {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(100, 255, 218, 0.7);
            outline: none;
        }

        .video-card.active {
            border-color: #64ffda;
            box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.15);
        }

        .thumbnail-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .thumbnail-wrapper img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 14px;
        }

        .video-info h4 {
            font-size: 16px;
            line-height: 1.35;
            margin-bottom: 8px;
        }

        .video-info p {
            color: #d7dde1;
            font-size: 14px;
            line-height: 1.45;
        }

        .fallback-link {
            text-align: center;
            margin-top: 24px;
        }

        .fallback-link a {
            color: #64ffda;
            font-weight: bold;
            text-decoration: none;
        }

        .fallback-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body { padding: 24px 14px; }
            .header h1 { font-size: 26px; }
            .main-player { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kriptografi</h1>
            <p>Playlist pembelajaran: pengantar kriptografi, enkripsi, dekripsi, cipher klasik, Caesar, Vigenere, Hill, DES, RSA, hash, tanda tangan digital, dan kriptanalisis.</p>
        </div>

        <main class="main-player" aria-live="polite">
            <div class="video-wrapper">
                <iframe
                    id="youtubePlayer"
                    src="https://www.youtube-nocookie.com/embed/JkWE21YMY3M?rel=0&playsinline=1"
                    title="Pengantar Kriptografi"
                    loading="eager"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
            </div>

            <div id="currentVideoTitle">Pengantar Kriptografi</div>
            <div id="currentVideoDescription">Pengenalan konsep dasar kriptografi dari seri kuliah kriptografi.</div>
        </main>

        <div class="video-grid" id="videoGrid"></div>

        <div class="fallback-link">
            <a
                id="fallbackLink"
                href="https://www.youtube.com/watch?v=JkWE21YMY3M"
                target="_blank"
                rel="noopener noreferrer"
            >
                Tonton langsung di YouTube
            </a>
        </div>
    </div>

    <script>
        const videos = [
            {
                id: 'JkWE21YMY3M',
                title: 'Pengantar Kriptografi',
                description: 'Pengenalan konsep dasar kriptografi dari seri kuliah kriptografi.'
            },
            {
                id: 'ZKgLE61dTlc',
                title: 'Kriptografi Klasik dan Modern',
                description: 'Overview kriptografi klasik, modern, kunci simetris, dan kunci asimetris.'
            },
            {
                id: '10tPgOLoFIQ',
                title: 'Kriptografi Klasik',
                description: 'Pembahasan konsep dan contoh kriptografi klasik.'
            },
            {
                id: 'NBUmny9LRy0',
                title: 'Enkripsi dengan Teknik Caesar Cipher',
                description: 'Cara kerja enkripsi menggunakan Caesar cipher.'
            },
            {
                id: 'E8XFTzNfLxI',
                title: 'Caesar Cipher dan Contoh Soal',
                description: 'Pembahasan metode transformasi Caesar beserta contoh soal.'
            },
            {
                id: 'XjKmaso-_pc',
                title: 'Vigenere Cipher',
                description: 'Materi matematika diskrit tentang kriptografi metode Vigenere cipher.'
            },
            {
                id: 'hURVv2dxBeE',
                title: 'Metode Vigenere Cipher',
                description: 'Penjelasan enkripsi dan dekripsi menggunakan Vigenere cipher.'
            },
            {
                id: 'BNUs49yayvY',
                title: 'Cipher Transposisi',
                description: 'Pembahasan teknik cipher transposisi dalam kriptografi.'
            },
            {
                id: 'JgZsMmggozw',
                title: 'Algoritma Hill Cipher',
                description: 'Penjelasan algoritma Hill cipher dalam kriptografi.'
            },
            {
                id: '8PTgpGWMg7Q',
                title: 'Data Encryption Standard (DES)',
                description: 'Materi DES sebagai algoritma kriptografi kunci simetris.'
            },
            {
                id: 'q_vkfOw_9-k',
                title: 'Kriptografi Kunci Publik',
                description: 'Pengenalan public-key cryptography atau kriptografi kunci publik.'
            },
            {
                id: '6tZGIWdJfYc',
                title: 'Algoritma RSA',
                description: 'Pembahasan algoritma RSA dalam kriptografi.'
            },
            {
                id: 'oDnrICJB_D8',
                title: 'Fungsi Hash Kriptografi',
                description: 'Konsep fungsi hash dalam kriptografi.'
            },
            {
                id: 'p3IYCVTP-qU',
                title: 'Hash dan Digital Signature',
                description: 'Overview fungsi hash dan tanda tangan digital.'
            }
        ];

        const player = document.getElementById('youtubePlayer');
        const currentTitle = document.getElementById('currentVideoTitle');
        const currentDescription = document.getElementById('currentVideoDescription');
        const fallbackLink = document.getElementById('fallbackLink');
        const videoGrid = document.getElementById('videoGrid');

        function createCard(video, index) {
            const card = document.createElement('button');
            card.className = `video-card${index === 0 ? ' active' : ''}`;
            card.type = 'button';
            card.dataset.id = video.id;
            card.setAttribute('aria-label', `Putar video: ${video.title}`);

            card.innerHTML = `
                <div class="thumbnail-wrapper">
                    <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" loading="lazy">
                </div>
                <div class="video-info">
                    <h4>${video.title}</h4>
                    <p>${video.description}</p>
                </div>
            `;

            card.addEventListener('click', () => selectVideo(video, card));
            return card;
        }

        function selectVideo(video, selectedCard) {
            player.src = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&playsinline=1`;
            player.title = video.title;
            currentTitle.textContent = video.title;
            currentDescription.textContent = video.description;
            fallbackLink.href = `https://www.youtube.com/watch?v=${video.id}`;

            document.querySelectorAll('.video-card').forEach((card) => {
                card.classList.toggle('active', card === selectedCard);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        videos.forEach((video, index) => {
            videoGrid.appendChild(createCard(video, index));
        });
    </script>
</body>
</html>
