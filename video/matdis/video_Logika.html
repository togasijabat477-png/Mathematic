<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelajaran Logika | Matematika Diskrit</title>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://www.youtube-nocookie.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #10131f; color: white; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 34px; margin-bottom: 8px; }
        .header p { color: #cfd8dc; line-height: 1.5; }
        .main-player { background: rgba(0, 0, 0, 0.55); border-radius: 8px; padding: 20px; margin-bottom: 32px; border: 1px solid rgba(255, 255, 255, 0.16); box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24); }
        .video-wrapper, .thumbnail-wrapper { position: relative; aspect-ratio: 16 / 9; background: black; border-radius: 8px; overflow: hidden; }
        .video-wrapper iframe, .thumbnail-wrapper img { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        #currentVideoTitle { margin-top: 15px; text-align: center; font-weight: bold; font-size: 18px; line-height: 1.35; }
        .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(100, 255, 218, 0.12);
    border: 1.5px solid rgba(100, 255, 218, 0.5);
    color: #64ffda;
    padding: 10px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background .2s, border-color .2s, transform .15s;
    margin-bottom: 24px;
    display: inline-flex;
}
.btn-back:hover {
    background: rgba(100, 255, 218, 0.25);
    border-color: #64ffda;
    transform: translateY(-1px);
}
        #currentVideoDescription { margin-top: 8px; text-align: center; color: #cfd8dc; line-height: 1.5; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        <a href="../../index.html?page=materi&tab=aljabar" class="btn-back">← Kembali ke Materi</a>
        .video-card { background: rgba(255, 255, 255, 0.1); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-align: left; transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease; }
        .video-card:hover, .video-card:focus-visible { transform: translateY(-4px); background: rgba(255, 255, 255, 0.16); border-color: rgba(100, 255, 218, 0.7); outline: none; }
        .video-card.active { border-color: #64ffda; box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.15); }
        .video-info { padding: 14px; }
        .video-info h4 { font-size: 16px; line-height: 1.35; margin-bottom: 8px; }
        .video-info p { color: #d7dde1; font-size: 14px; line-height: 1.45; }
        .fallback-link { text-align: center; margin-top: 24px; }
        .fallback-link a { color: #64ffda; font-weight: bold; text-decoration: none; }
        .fallback-link a:hover { text-decoration: underline; }
        @media (max-width: 600px) { body { padding: 24px 14px; } .header h1 { font-size: 26px; } .main-player { padding: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Pembelajaran Logika</h1>
            <p>Playlist pembelajaran: proposisi, operasi logika, tabel kebenaran, biimplikasi, ekuivalensi logis, argumen, dan logika predikat.</p>
        </div>

        <main class="main-player" aria-live="polite">
            <div class="video-wrapper">
                <iframe id="youtubePlayer" src="https://www.youtube-nocookie.com/embed/U5eWAywK1Mo?rel=0&playsinline=1" title="Tabel Kebenaran Operasi Logika" loading="eager" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <div id="currentVideoTitle">Tabel Kebenaran Operasi Logika</div>
            <div id="currentVideoDescription">Cara menentukan tabel kebenaran dalam operasi logika matematika.</div>
        </main>

        <div class="video-grid" id="videoGrid"></div>
        <div class="fallback-link"><a id="fallbackLink" href="https://www.youtube.com/watch?v=U5eWAywK1Mo" target="_blank" rel="noopener noreferrer">Tonton langsung di YouTube</a></div>
    </div>

    <script>
        const videos = [
            { id: 'U5eWAywK1Mo', title: 'Tabel Kebenaran Operasi Logika', description: 'Cara menentukan tabel kebenaran dalam operasi logika matematika.' },
            { id: '4fzQ4PiF0lE', title: 'Biimplikasi - Proposisi', description: 'Pembahasan biimplikasi dalam proposisi dan logika matematika diskrit.' },
            { id: '0YD0U35T0bE', title: 'Ekuivalensi Logis', description: 'Materi ekuivalensi logis dalam seri kuliah matematika diskrit.' },
            { id: 'eAMSxR5wTZU', title: 'Argumen dan Logika Predikat', description: 'Pengenalan argumen serta logika predikat dalam matematika diskrit.' },
            { id: 'vweGM-AXjbA', title: 'Proposisi Majemuk', description: 'Pembahasan proposisi majemuk dalam logika matematika diskrit.' },
            { id: 'Sd9eOdIVImE', title: 'Negasi Pernyataan dan Disjungsi', description: 'Materi singkat tentang negasi dan disjungsi.' },
            { id: '-8ehiG6kHDs', title: 'Negasi Implikasi Berkuantor', description: 'Pembahasan negasi, implikasi, dan pernyataan berkuantor.' },
            { id: 'HLMf22CbzNA', title: 'Tautologi, Kontradiksi, dan Kontingensi', description: 'Cara membedakan tautologi, kontradiksi, dan kontingensi.' },
            { id: 'B60p1sxU3Qk', title: 'Hukum Kontradiksi, Tautologi, dan Double Negasi', description: 'Hukum-hukum dasar dalam logika matematika diskrit.' },
            { id: 'WV_71FsEOtY', title: 'Inferensi atau Tautologi', description: 'Pembahasan inferensi dalam matematika diskrit dan logika.' },
            { id: '7TWDvb65OyU', title: 'Argumen Logika Matematika Diskrit', description: 'Materi argumen dan validitas dalam logika matematika.' },
            { id: 'EyAKT9xf22w', title: 'Logika Kuantor', description: 'Pengenalan kuantor universal dan eksistensial.' },
            { id: '3C-vFEkbJq4', title: 'Hukum De Morgan', description: 'Ekuivalensi logika dan hukum De Morgan.' },
            { id: 'ne4DXa6kiIc', title: 'Konvers, Invers, dan Kontraposisi', description: 'Relasi antara implikasi, konvers, invers, dan kontraposisi.' }
        ];
        const player = document.getElementById('youtubePlayer');
        const currentTitle = document.getElementById('currentVideoTitle');
        const currentDescription = document.getElementById('currentVideoDescription');
        const fallbackLink = document.getElementById('fallbackLink');
        const videoGrid = document.getElementById('videoGrid');
        function createCard(video, index) { const card = document.createElement('button'); card.className = `video-card${index === 0 ? ' active' : ''}`; card.type = 'button'; card.setAttribute('aria-label', `Putar video: ${video.title}`); card.innerHTML = `<div class="thumbnail-wrapper"><img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" loading="lazy"></div><div class="video-info"><h4>${video.title}</h4><p>${video.description}</p></div>`; card.addEventListener('click', () => selectVideo(video, card)); return card; }
        function selectVideo(video, selectedCard) { player.src = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&playsinline=1`; player.title = video.title; currentTitle.textContent = video.title; currentDescription.textContent = video.description; fallbackLink.href = `https://www.youtube.com/watch?v=${video.id}`; document.querySelectorAll('.video-card').forEach((card) => card.classList.toggle('active', card === selectedCard)); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        videos.forEach((video, index) => videoGrid.appendChild(createCard(video, index)));
    </script>
</body>
</html>
