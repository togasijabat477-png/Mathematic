<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelajaran Graf | Matematika Diskrit</title>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://www.youtube-nocookie.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #10131f; color: white; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 34px; margin-bottom: 8px; }
        .header p { color: #cfd8dc; line-height: 1.5; }
        .main-player { background: rgba(0, 0, 0, 0.55); border-radius: 8px; padding: 20px; margin-bottom: 32px; border: 1px solid rgba(255, 255, 255, 0.16); box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24); }
        .video-wrapper, .thumbnail-wrapper { position: relative; aspect-ratio: 16 / 9; background: black; border-radius: 8px; overflow: hidden; }
        .video-wrapper iframe, .thumbnail-wrapper img { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        #currentVideoTitle { margin-top: 15px; text-align: center; font-weight: bold; font-size: 18px; line-height: 1.35; }
        #currentVideoDescription { margin-top: 8px; text-align: center; color: #cfd8dc; line-height: 1.5; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: rgba(255, 255, 255, 0.1); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-align: left; transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease; }
        .video-card:hover, .video-card:focus-visible { transform: translateY(-4px); background: rgba(255, 255, 255, 0.16); border-color: rgba(100, 255, 218, 0.7); outline: none; }
        .video-card.active { border-color: #64ffda; box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.15); }
        .video-info { padding: 14px; }
        .video-info h4 { font-size: 16px; line-height: 1.35; margin-bottom: 8px; }
        .video-info p { color: #d7dde1; font-size: 14px; line-height: 1.45; }
        .fallback-link { text-align: center; margin-top: 24px; }
        .fallback-link a { color: #64ffda; font-weight: bold; text-decoration: none; }
        .fallback-link a:hover { text-decoration: underline; }
        @media (max-width: 600px) { body { padding: 24px 14px; } .header h1 { font-size: 26px; } .main-player { padding: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Pembelajaran Graf</h1>
            <p>Playlist pembelajaran: pengertian graf, konsep dasar, representasi graf, lintasan, sirkuit, Euler, dan Hamilton.</p>
        </div>

        <main class="main-player" aria-live="polite">
            <div class="video-wrapper">
                <iframe id="youtubePlayer" src="https://www.youtube-nocookie.com/embed/7x6dc4G-mkY?rel=0&playsinline=1" title="Matdis 30: Graf - Apa itu Graf" loading="eager" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <div id="currentVideoTitle">Matdis 30: Graf - Apa itu Graf</div>
            <div id="currentVideoDescription">Pengantar graf dalam matematika diskrit.</div>
        </main>

        <div class="video-grid" id="videoGrid"></div>
        <div class="fallback-link"><a id="fallbackLink" href="https://www.youtube.com/watch?v=7x6dc4G-mkY" target="_blank" rel="noopener noreferrer">Tonton langsung di YouTube</a></div>
    </div>

    <script>
        const videos = [
            { id: '7x6dc4G-mkY', title: 'Matdis 30: Graf - Apa itu Graf', description: 'Pengantar graf dalam matematika diskrit.' },
            { id: '7OgJ6lJ8cMk', title: 'Graf - Konsep Umum Graf', description: 'Konsep dasar graf, simpul, sisi, dan contoh penggunaannya.' },
            { id: 'Gvzrug-V0e8', title: 'Matdis 34: Representasi Graf', description: 'Representasi graf dengan matriks dan struktur terkait.' },
            { id: 'JC8rT9MCEKo', title: 'Lintasan/Sirkuit Euler dan Hamilton', description: 'Pembahasan lintasan, sirkuit, Euler, dan Hamilton pada graf.' },
            { id: '0E1bjRHoPWM', title: 'Graf Tak Berarah', description: 'Materi graf tak berarah dalam matematika diskrit.' },
            { id: 'lcHdtwUl5_A', title: 'Terminologi Graf dan Derajat Simpul', description: 'Ketetanggaan, bersisian, dan derajat simpul pada graf.' },
            { id: 'csOWU45VOgs', title: 'Graf Planar dan Bidang', description: 'Pembahasan graf planar, ketaksamaan Euler, dan teorema Kuratowski.' },
            { id: '_zZucf9SbWQ', title: 'Graf Bipartit', description: 'Pengertian dan contoh graf bipartit.' },
            { id: 'ldB_o4VDP_o', title: 'Isomorfisme Graf', description: 'Konsep isomorfisme pada teori graf.' },
            { id: 'qCuAxXw98-Q', title: 'Pewarnaan Graf', description: 'Materi pewarnaan graf dan bilangan kromatik.' },
            { id: 'qIzCYrE8570', title: 'Algoritma Dijkstra', description: 'Konsep lintasan terpendek menggunakan algoritma Dijkstra.' },
            { id: 'HkNdNpKUByM', title: 'Introduction to Graph Theory', description: 'Pengantar graph theory dalam discrete mathematics.' },
            { id: '7AhHGp7EzZ8', title: 'Adjacency Matrix', description: 'Representasi graf menggunakan adjacency matrix.' },
            { id: '5M-m62qTR-s', title: 'Euler Paths and Euler Circuits', description: 'Penjelasan Euler path dan Euler circuit dalam graph theory.' }
        ];

        const player = document.getElementById('youtubePlayer');
        const currentTitle = document.getElementById('currentVideoTitle');
        const currentDescription = document.getElementById('currentVideoDescription');
        const fallbackLink = document.getElementById('fallbackLink');
        const videoGrid = document.getElementById('videoGrid');

        function createCard(video, index) {
            const card = document.createElement('button');
            card.className = `video-card${index === 0 ? ' active' : ''}`;
            card.type = 'button';
            card.setAttribute('aria-label', `Putar video: ${video.title}`);
            card.innerHTML = `<div class="thumbnail-wrapper"><img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" loading="lazy"></div><div class="video-info"><h4>${video.title}</h4><p>${video.description}</p></div>`;
            card.addEventListener('click', () => selectVideo(video, card));
            return card;
        }

        function selectVideo(video, selectedCard) {
            player.src = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&playsinline=1`;
            player.title = video.title;
            currentTitle.textContent = video.title;
            currentDescription.textContent = video.description;
            fallbackLink.href = `https://www.youtube.com/watch?v=${video.id}`;
            document.querySelectorAll('.video-card').forEach((card) => card.classList.toggle('active', card === selectedCard));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        videos.forEach((video, index) => videoGrid.appendChild(createCard(video, index)));
    </script>
</body>
</html>
