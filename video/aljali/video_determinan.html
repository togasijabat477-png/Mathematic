<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelajaran Determinan | Aljabar Linear</title>
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://www.youtube-nocookie.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #10131f; color: white; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 34px; margin-bottom: 8px; }
        .header p { color: #cfd8dc; line-height: 1.5; }
        .main-player { background: rgba(0,0,0,.55); border-radius: 8px; padding: 20px; margin-bottom: 32px; border: 1px solid rgba(255,255,255,.16); box-shadow: 0 18px 60px rgba(0,0,0,.24); }
        .video-wrapper, .thumbnail-wrapper { position: relative; aspect-ratio: 16 / 9; background: black; border-radius: 8px; overflow: hidden; }
        .video-wrapper iframe, .thumbnail-wrapper img { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        #currentVideoTitle { margin-top: 15px; text-align: center; font-weight: bold; font-size: 18px; line-height: 1.35; }
        #currentVideoDescription { margin-top: 8px; text-align: center; color: #cfd8dc; line-height: 1.5; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: rgba(255,255,255,.1); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,.2); color: white; text-align: left; transition: transform .2s ease, background .2s ease, border-color .2s ease; }
        .video-card:hover, .video-card:focus-visible { transform: translateY(-4px); background: rgba(255,255,255,.16); border-color: rgba(100,255,218,.7); outline: none; }
        .video-card.active { border-color: #64ffda; box-shadow: 0 0 0 2px rgba(100,255,218,.15); }
        .video-info { padding: 14px; }
        .video-info h4 { font-size: 16px; line-height: 1.35; margin-bottom: 8px; }
        .video-info p { color: #d7dde1; font-size: 14px; line-height: 1.45; }
        .fallback-link { text-align: center; margin-top: 24px; }
        .fallback-link a { color: #64ffda; font-weight: bold; text-decoration: none; }
        .fallback-link a:hover { text-decoration: underline; }
        @media (max-width: 600px) { body { padding: 24px 14px; } .header h1 { font-size: 26px; } .main-player { padding: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Determinan</h1>
            <p>Playlist pembelajaran: pengertian determinan, metode Sarrus, ekspansi kofaktor, reduksi baris, sifat determinan, dan penerapannya.</p>
        </div>
        <main class="main-player" aria-live="polite">
            <div class="video-wrapper"><iframe id="youtubePlayer" src="https://www.youtube-nocookie.com/embed/3d8-MXUzfDI?rel=0&playsinline=1" title="Mencari Determinan dengan Metode OBE" loading="eager" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
            <div id="currentVideoTitle">Mencari Determinan dengan Metode OBE</div>
            <div id="currentVideoDescription">Cara menentukan determinan matriks menggunakan operasi baris elementer.</div>
        </main>
        <div class="video-grid" id="videoGrid"></div>
        <div class="fallback-link"><a id="fallbackLink" href="https://www.youtube.com/watch?v=3d8-MXUzfDI" target="_blank" rel="noopener noreferrer">Tonton langsung di YouTube</a></div>
    </div>
    <script>
        const videos = [
            { id: '3d8-MXUzfDI', title: 'Mencari Determinan dengan Metode OBE', description: 'Cara menentukan determinan matriks menggunakan operasi baris elementer.' },
            { id: 'K5-pdv4W9D8', title: 'Determinan Matriks', description: 'Pembahasan dasar determinan matriks dalam aljabar linear.' },
            { id: '-kzRfopKavE', title: 'Determinan Matriks 2x2 dan 3x3', description: 'Cara cepat menghitung determinan matriks ordo 2 dan ordo 3.' },
            { id: 'DGnEM4aawdE', title: 'Determinan Matriks 3x3 Metode Sarrus', description: 'Langkah menentukan determinan ordo 3 menggunakan metode Sarrus.' },
            { id: 'onYxSDAFoFw', title: 'Determinan 3x3 dengan Ekspansi Kofaktor', description: 'Cara menghitung determinan menggunakan ekspansi kofaktor.' },
            { id: 'Lr0v5toVj0Y', title: 'Determinan dengan Reduksi Baris', description: 'Penyelesaian soal determinan menggunakan reduksi baris.' },
            { id: 'zuRvZov-Z24', title: 'Sifat-Sifat Determinan Matriks', description: 'Pembahasan sifat determinan yang sering dipakai dalam soal.' },
            { id: 'ismncHLRYMU', title: 'Determinan dan Invers Matriks', description: 'Hubungan determinan dengan invers matriks.' },
            { id: 'qbZSob2MG74', title: 'Contoh Soal Determinan Matriks', description: 'Latihan soal determinan matriks dan pembahasannya.' },
            { id: 'mTHpXve6VDk', title: 'Determinan Matriks 4x4', description: 'Cara mencari determinan matriks ordo 4.' },
            { id: 'Ysu5CuL0XY8', title: 'Aljabar Linear Dasar: Determinan Matriks', description: 'Materi determinan dalam aljabar linear dasar.' },
            { id: 'Ip3X9LOh2dk', title: 'The Determinant', description: 'Penjelasan visual determinan dari Essence of Linear Algebra.' },
            { id: 'Tvibn_2p83Q', title: 'Cofactor Expansion 4x4', description: 'Menghitung determinan 4x4 dengan ekspansi kofaktor.' },
            { id: 'Q8BCPYYw4qk', title: 'Determinants with Row Reduction', description: 'Menghitung determinan menggunakan row reduction.' }
        ];
        const player = document.getElementById('youtubePlayer'), currentTitle = document.getElementById('currentVideoTitle'), currentDescription = document.getElementById('currentVideoDescription'), fallbackLink = document.getElementById('fallbackLink'), videoGrid = document.getElementById('videoGrid');
        function createCard(video, index) { const card = document.createElement('button'); card.className = `video-card${index === 0 ? ' active' : ''}`; card.type = 'button'; card.setAttribute('aria-label', `Putar video: ${video.title}`); card.innerHTML = `<div class="thumbnail-wrapper"><img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="${video.title}" loading="lazy"></div><div class="video-info"><h4>${video.title}</h4><p>${video.description}</p></div>`; card.addEventListener('click', () => selectVideo(video, card)); return card; }
        function selectVideo(video, selectedCard) { player.src = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&rel=0&playsinline=1`; player.title = video.title; currentTitle.textContent = video.title; currentDescription.textContent = video.description; fallbackLink.href = `https://www.youtube.com/watch?v=${video.id}`; document.querySelectorAll('.video-card').forEach((card) => card.classList.toggle('active', card === selectedCard)); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        videos.forEach((video, index) => videoGrid.appendChild(createCard(video, index)));
    </script>
</body>
</html>
