<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latihan — Math Unity</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --border: #e4e8f5;
      --text: #0f1526;
      --text2: #4a5280;
      --text3: #9aa0c0;
      --accent: #5c41f5;
      --accent-light: #ede9ff;
      --green: #1faa6b;
      --green-light: #e6f7ef;
      --red: #e2456a;
      --red-light: #fdecf0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
 
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center;
      gap: 16px; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 0 var(--border);
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all .2s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .topbar-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .modul-badge {
      font-size: .75rem; font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px; border-radius: 99px; font-weight: 600;
      background: var(--accent-light); color: var(--accent);
    }
 
    .main { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    .wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px;
      box-shadow: 0 4px 24px rgba(92,65,245,.06);
    }
 
    .state-box { text-align: center; padding: 70px 20px; }
    .state-box .icon { font-size: 3rem; margin-bottom: 16px; }
    .state-box h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .state-box p { color: var(--text3); font-size: .9rem; }
 
    /* progress */
    .q-head { margin-bottom: 28px; }
    .q-head h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 12px; }
    .progress-bar { height: 8px; background: var(--accent-light); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }
    .progress-label { font-size: .8rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
 
    .q-text { font-size: 1.15rem; font-weight: 700; line-height: 1.5; margin-bottom: 24px; }
 
    .opt-btn {
      display: flex; align-items: center; gap: 12px; width: 100%;
      text-align: left; padding: 14px 18px; margin-bottom: 10px;
      border: 1.5px solid var(--border); border-radius: 14px; background: var(--surface);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: .95rem; color: var(--text);
      cursor: pointer; transition: all .15s;
    }
    .opt-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .opt-btn.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 600; }
    .opt-letter {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: .8rem; font-weight: 700; color: var(--text2);
    }
    .opt-btn.selected .opt-letter { background: var(--accent); color: #fff; }
 
    .q-footer { display: flex; justify-content: flex-end; margin-top: 24px; }
    .btn-next {
      padding: 12px 26px; border-radius: 12px; border: none;
      background: var(--accent); color: #fff; font-weight: 700;
      font-size: .95rem; cursor: pointer; transition: all .15s;
    }
    .btn-next:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
    .btn-next:not(:disabled):hover { background: #4f35d4; }
 
    /* hasil */
    .score-box { text-align: center; padding: 16px 0 32px; }
    .score-emoji { font-size: 3.2rem; margin-bottom: 8px; }
    .score-num { font-size: 2.4rem; font-weight: 800; }
    .score-sub { color: var(--text3); font-size: .9rem; margin-top: 4px; }
 
    .review-item {
      border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
    }
    .review-item.correct { border-color: var(--green); background: var(--green-light); }
    .review-item.wrong { border-color: var(--red); background: var(--red-light); }
    .review-q { font-weight: 700; margin-bottom: 10px; }
    .review-ans { font-size: .88rem; margin-bottom: 4px; }
    .review-ans .lbl { color: var(--text3); }
    .review-expl {
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
      font-size: .85rem; color: var(--text2); line-height: 1.6;
    }
    .review-expl b { color: var(--text); }
 
    .result-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-action {
      flex: 1; text-align: center; padding: 12px; border-radius: 12px;
      font-weight: 700; font-size: .9rem; cursor: pointer; text-decoration: none;
      border: 1.5px solid var(--border); background: var(--surface); color: var(--text2);
    }
    .btn-action.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
 
    @media (max-width: 640px) {
      .wrap { padding: 24px 20px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>
 
<div class="topbar">
  <a href="#" class="btn-back" id="btnBack">← Kembali</a>
  <span class="topbar-title" id="topbarTitle">Latihan</span>
  <span class="modul-badge" id="topbarModul">-</span>
</div>
 
<div class="main">
  <div class="wrap">
 
    <div id="stateLoading" class="state-box">
      <div class="icon">⏳</div>
      <h2>Memuat latihan...</h2>
      <p>Mohon tunggu sebentar</p>
    </div>
 
    <div id="stateError" class="state-box" style="display:none">
      <div class="icon">😕</div>
      <h2 id="errorTitle">Latihan tidak ditemukan</h2>
      <p id="errorDesc">Latihan ini belum tersedia atau soalnya belum diisi</p>
    </div>
 
    <div id="stateQuiz" style="display:none"></div>
    <div id="stateResult" style="display:none"></div>
 
  </div>
</div>
 
<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://ytwfwxjutdlukjvnlnzv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0d2Z3eGp1dGRsdWtqdm5sbnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDEyNTEsImV4cCI6MjA5NjU3NzI1MX0.elwvWee305pJaWxGCVuaHBtyegFsu7Gvhs5L4dYEZMY'
  );
 
  const params = new URLSearchParams(window.location.search);
  const latihanId = params.get('id');
  const backPage = sessionStorage.getItem('backPage') || 'materi';
  const materiTab = sessionStorage.getItem('materiTab') || 'diskrit';
  const backUrl = 'index.html?page=' + backPage + '&tab=' + materiTab;
  document.getElementById('btnBack').href = backUrl;
 
  const L = ['A', 'B', 'C', 'D', 'E'];
  let questions = [];
  let current = 0;
  let answers = [];
  let latihanInfo = null;
 
  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }
 
  async function init() {
    if (!latihanId) { showError('Latihan tidak ditemukan', 'Link yang dibuka tidak valid.'); return; }
 
    const { data: latihan, error: e1 } = await db.from('latihan').select('*').eq('id', latihanId).single();
    if (e1 || !latihan) { showError(); return; }
    latihanInfo = latihan;
 
    document.getElementById('topbarTitle').textContent = latihan.judul;
    document.getElementById('topbarModul').textContent = latihan.modul || '-';
    document.title = latihan.judul + ' — Math Unity';
 
    const { data: soal, error: e2 } = await db
      .from('soal')
      .select('*')
      .eq('modul', latihan.modul)
      .eq('level', latihan.level)
      .eq('judul', latihan.judul)
      .order('urutan');
 
    if (e2) { showError(); return; }
    if (!soal || !soal.length) {
      showError('Belum ada soal', 'Topik latihan ini belum diisi soal oleh admin.');
      return;
    }
 
    questions = soal;
    answers = new Array(soal.length).fill(null);
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateQuiz').style.display = 'block';
    renderQuestion();
  }
 
  function showError(title, desc) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateError').style.display = 'block';
    if (title) document.getElementById('errorTitle').textContent = title;
    if (desc) document.getElementById('errorDesc').textContent = desc;
  }
 
  function renderQuestion() {
    const q = questions[current];
    const selected = answers[current];
    const opts = q.opsi || [];
 
    const html = `
      <div class="q-head">
        <div class="progress-bar"><div class="progress-fill" style="width:${((current) / questions.length) * 100}%"></div></div>
        <div class="progress-label">Soal ${current + 1} dari ${questions.length}</div>
      </div>
      <div class="q-text">${escapeHtml(q.pertanyaan)}</div>
      <div class="opt-list">
        ${opts.map((o, i) => `
          <button class="opt-btn${selected === i ? ' selected' : ''}" onclick="selectOption(${i})">
            <span class="opt-letter">${L[i]}</span>
            <span>${escapeHtml(o)}</span>
          </button>`).join('')}
      </div>
      <div class="q-footer">
        <button class="btn-next" id="btnNext" ${selected === null ? 'disabled' : ''} onclick="nextQuestion()">
          ${current === questions.length - 1 ? '🏆 Lihat Hasil' : 'Soal Berikutnya →'}
        </button>
      </div>`;
 
    document.getElementById('stateQuiz').innerHTML = html;
  }
 
  function selectOption(i) {
    answers[current] = i;
    renderQuestion();
  }
 
  function nextQuestion() {
    if (answers[current] === null) return;
    if (current < questions.length - 1) {
      current++;
      renderQuestion();
    } else {
      renderResult();
    }
  }
 
  function renderResult() {
    let correctCount = 0;
    const reviewHtml = questions.map((q, i) => {
      const userAns = answers[i];
      const isCorrect = userAns === q.jawaban_benar;
      if (isCorrect) correctCount++;
      const opts = q.opsi || [];
      return `
        <div class="review-item ${isCorrect ? 'correct' : 'wrong'}">
          <div class="review-q">${i + 1}. ${escapeHtml(q.pertanyaan)}</div>
          <div class="review-ans"><span class="lbl">Jawabanmu:</span> ${userAns !== null ? L[userAns] + '. ' + escapeHtml(opts[userAns] || '') : '-'} ${isCorrect ? '✅' : '❌'}</div>
          ${!isCorrect ? `<div class="review-ans"><span class="lbl">Jawaban benar:</span> ${L[q.jawaban_benar]}. ${escapeHtml(opts[q.jawaban_benar] || '')}</div>` : ''}
          ${q.penjelasan_isi ? `<div class="review-expl"><b>${escapeHtml(q.penjelasan_judul || 'Penjelasan')}:</b> ${escapeHtml(q.penjelasan_isi)}</div>` : ''}
        </div>`;
    }).join('');
 
    const pct = Math.round((correctCount / questions.length) * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
 
    document.getElementById('stateQuiz').style.display = 'none';
    document.getElementById('stateResult').style.display = 'block';
    document.getElementById('stateResult').innerHTML = `
      <div class="score-box">
        <div class="score-emoji">${emoji}</div>
        <div class="score-num">${correctCount} / ${questions.length}</div>
        <div class="score-sub">Skor kamu: ${pct}%</div>
      </div>
      ${reviewHtml}
      <div class="result-actions">
        <button class="btn-action" onclick="restart()">🔁 Ulangi Latihan</button>
        <a class="btn-action primary" href="${backUrl}">Kembali ke Materi →</a>
      </div>`;
  }
 
  function restart() {
    current = 0;
    answers = new Array(questions.length).fill(null);
    document.getElementById('stateResult').style.display = 'none';
    document.getElementById('stateQuiz').style.display = 'block';
    renderQuestion();
  }
 
  init();
</script>
</body>
</html>
